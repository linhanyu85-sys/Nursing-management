<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>护理后台管理系统</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="side-nav">
      <div class="brand-block">
        <div class="brand-mark">护</div>
        <div class="brand-copy">
          <h1>护理后台管理</h1>
          <p>病例、账号、病区运行和后台联通状态统一维护</p>
        </div>
      </div>

      <nav class="nav-list" id="nav-list">
        <button class="nav-link active" data-view="overview">病区总览</button>
        <button class="nav-link" data-view="cases">病例工作台</button>
        <button class="nav-link" data-view="accounts">账号中心</button>
        <button class="nav-link" data-view="monitor">联通监控</button>
      </nav>

      <section class="nav-card">
        <div class="nav-card-label">当前病区</div>
        <div class="nav-card-title" id="current-department-name">加载中</div>
        <div class="nav-card-meta" id="current-department-meta">等待同步病区数据</div>
      </section>

      <section class="nav-card">
        <div class="nav-card-label">当前操作账号</div>
        <div class="nav-card-title" id="operator-name">未选择</div>
        <div class="nav-card-meta" id="operator-role">请在顶部切换当前操作账号</div>
      </section>
    </aside>

    <main class="main-shell">
      <header class="topbar">
        <div class="topbar-copy">
          <div class="topbar-label">护理系统后台</div>
          <h2 id="view-title">病区总览</h2>
        </div>
        <div class="topbar-actions">
          <button id="gateway-status" class="status-chip is-neutral">网关待检测</button>
          <button id="refresh-btn" class="action-btn-secondary">刷新</button>
          <button id="open-config-btn" class="action-btn-secondary">连接配置</button>
        </div>
      </header>

      <section class="filterbar">
        <label class="field-group field-group-wide">
          <span>病区</span>
          <select id="department-select"></select>
        </label>

        <label class="field-group field-group-wide">
          <span>检索</span>
          <input id="global-search" type="text" placeholder="搜索床位、姓名、病历号、账号或任务" />
        </label>

        <label class="field-group">
          <span>病例状态</span>
          <select id="case-status-filter">
            <option value="">全部</option>
            <option value="admitted">在院</option>
            <option value="transferred">转科</option>
            <option value="discharged">出院</option>
          </select>
        </label>

        <label class="field-group">
          <span>账号状态</span>
          <select id="account-status-filter">
            <option value="">全部</option>
            <option value="active">启用</option>
            <option value="inactive">停用</option>
            <option value="locked">锁定</option>
          </select>
        </label>

        <label class="field-group field-group-wide">
          <span>当前操作账号</span>
          <select id="operator-select"></select>
        </label>
      </section>

      <section class="system-strip" id="system-strip"></section>

      <section id="view-root" class="view-root">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>正在加载后台管理数据...</p>
        </div>
      </section>
    </main>
  </div>

  <div class="drawer hidden" id="config-drawer">
    <div class="drawer-panel">
      <div class="drawer-head">
        <div>
          <div class="drawer-label">连接配置</div>
          <h3>API 网关地址</h3>
        </div>
        <button id="close-config-btn" class="icon-btn" type="button">关闭</button>
      </div>

      <div class="drawer-body">
        <label class="field-group">
          <span>API 地址</span>
          <input id="cfg-api-base" type="text" placeholder="http://127.0.0.1:18000" />
        </label>
        <p class="drawer-tip">如果管理台已经挂在同一个网关下，通常保持默认即可。</p>
      </div>

      <div class="drawer-actions">
        <button id="save-config-btn" class="action-btn">保存并重载</button>
      </div>
    </div>
  </div>

  <div id="toast-stack" class="toast-stack"></div>
  <script src="./assets/app.js"></script>
</body>
</html>
